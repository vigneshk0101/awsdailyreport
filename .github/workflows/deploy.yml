name: Daily Cloud Monitor

on:
  schedule:
    - cron: "30 12 * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Generate Cloud Report and Send Email
        shell: bash
        run: |
          # Create report
          echo "===== DAILY CLOUD STATUS REPORT =====" > report.txt
          echo "Generated (UTC): $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> report.txt
          echo "" >> report.txt

          REGIONS=$(aws ec2 describe-regions --query "Regions[].RegionName" --output text)

          for REGION in $REGIONS; do
            echo "=== Region: $REGION ===" >> report.txt

            echo "Running EC2 Instances:" >> report.txt
            aws ec2 describe-instances --region "$REGION" \
              --filters Name=instance-state-name,Values=running \
              --query "Reservations[].Instances[].InstanceId" \
              --output text >> report.txt
            echo "" >> report.txt

            echo "VPCs:" >> report.txt
            aws ec2 describe-vpcs --region "$REGION" \
              --query "Vpcs[].VpcId" \
              --output text >> report.txt
            echo "" >> report.txt

            echo "Elastic IPs:" >> report.txt
            aws ec2 describe-addresses --region "$REGION" \
              --query "Addresses[].PublicIp" \
              --output text >> report.txt
            echo "" >> report.txt

            echo "ECR Repositories:" >> report.txt
            aws ecr describe-repositories --region "$REGION" \
              --query "repositories[].repositoryName" \
              --output text >> report.txt
            echo "" >> report.txt
          done

          echo "=== S3 Buckets (Global) ===" >> report.txt
          aws s3 ls >> report.txt
          echo "" >> report.txt

                    # =============================
            # AWS Cost Explorer Section
            # =============================
            
            echo "=============================" >> report.txt
            echo "AWS Cost Explorer Report" >> report.txt
            echo "=============================" >> report.txt
            
            # Dynamic UTC-safe dates (permanent fix)
            START_DATE=$(date -u +%Y-%m-01)
            END_DATE=$(date -u -d "tomorrow" +%Y-%m-%d)
            
            echo "Cost Report From $START_DATE To $END_DATE" >> report.txt
            echo "" >> report.txt
            
            echo "Current Bill:" >> report.txt
            aws ce get-cost-and-usage \
              --time-period Start=$START_DATE,End=$END_DATE \
              --granularity MONTHLY \
              --metrics "UnblendedCost" \
              --query 'ResultsByTime[].Total.UnblendedCost.Amount' \
              --output text >> report.txt
            
            echo "" >> report.txt
            echo "Forecast for Next 30 Days:" >> report.txt
            
            FORECAST_END=$(date -u -d "+30 days" +%Y-%m-%d)
            
            aws ce get-cost-forecast \
              --time-period Start=$END_DATE,End=$FORECAST_END \
              --metric UNBLENDED_COST \
              --granularity MONTHLY \
              --query 'Total.Amount' \
              --output text >> report.txt
            
            echo "" >> report.txt

          # Build raw email file (no here-doc, no JSON issues)

          echo "From: ${{ secrets.SES_SENDER_EMAIL }}" > raw_email.txt
          echo "To: ${{ secrets.SES_RECEIVER_EMAIL }}" >> raw_email.txt
          echo "Subject: Daily Cloud Monitor Report" >> raw_email.txt
          echo "MIME-Version: 1.0" >> raw_email.txt
          echo "Content-Type: multipart/mixed; boundary=NextPart" >> raw_email.txt
          echo "" >> raw_email.txt

          echo "--NextPart" >> raw_email.txt
          echo "Content-Type: text/plain; charset=UTF-8" >> raw_email.txt
          echo "" >> raw_email.txt
          echo "Please find the daily cloud monitor report attached." >> raw_email.txt
          echo "" >> raw_email.txt

          echo "--NextPart" >> raw_email.txt
          echo "Content-Type: text/plain; name=report.txt" >> raw_email.txt
          echo "Content-Disposition: attachment; filename=report.txt" >> raw_email.txt
          echo "Content-Transfer-Encoding: base64" >> raw_email.txt
          echo "" >> raw_email.txt
          base64 report.txt >> raw_email.txt
          echo "" >> raw_email.txt
          echo "--NextPart--" >> raw_email.txt

          # Send email
          aws ses send-raw-email \
            --raw-message Data="$(base64 raw_email.txt)" \
            --region us-east-1
